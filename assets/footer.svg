<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <clipPath id="fc">
      <rect width="900" height="200"/>
    </clipPath>
  </defs>

  <style>
    .ga { animation: fl  9s linear infinite; }
    .gb { animation: fr 14s linear infinite; }
    .gc { animation: fl 19s linear infinite; }
    .gd { animation: fr 12s linear infinite; }
    .ge { animation: fl 16s linear infinite; }
    @keyframes fl { to { transform: translateX(-900px); } }
    @keyframes fr { to { transform: translateX( 900px); } }
    @media (prefers-reduced-motion: reduce) {
      .ga, .gb, .gc, .gd, .ge { animation: none; }
    }
  </style>

  <rect width="900" height="200" fill="#0F1117"/>

  <g clip-path="url(#fc)">

    <!-- Band A: y 5–37, flow-left 9s, amp ±9 -->
    <g class="ga" fill="none" stroke="#2A2D3E" stroke-width="1.2">
      <path opacity="0.30" d="M 0,5  Q 225,-4  450,5  Q 675,14  900,5  Q 1125,-4  1350,5  Q 1575,14  1800,5"/>
      <path opacity="0.50" d="M 0,13 Q 225,22  450,13 Q 675,4   900,13 Q 1125,22  1350,13 Q 1575,4   1800,13"/>
      <path opacity="0.70" d="M 0,21 Q 225,12  450,21 Q 675,30  900,21 Q 1125,12  1350,21 Q 1575,30  1800,21"/>
      <path opacity="0.50" d="M 0,29 Q 225,38  450,29 Q 675,20  900,29 Q 1125,38  1350,29 Q 1575,20  1800,29"/>
      <path opacity="0.30" d="M 0,37 Q 225,28  450,37 Q 675,46  900,37 Q 1125,28  1350,37 Q 1575,46  1800,37"/>
    </g>

