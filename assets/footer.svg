      <path opacity="0.30" d="M 0,178 Q 225,171 450,178 Q 675,185 900,178 Q 1125,171 1350,178 Q 1575,185 1800,178"/>
      <path opacity="0.50" d="M 0,185 Q 225,192 450,185 Q 675,178 900,185 Q 1125,192 1350,185 Q 1575,178 1800,185"/>
      <path opacity="0.65" d="M 0,192 Q 225,185 450,192 Q 675,199 900,192 Q 1125,185 1350,192 Q 1575,199 1800,192"/>
