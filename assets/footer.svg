      <path opacity="0.30" d="M -900,48 Q -675,59  -450,48 Q -225,37  0,48 Q 225,59  450,48 Q 675,37  900,48"/>
      <path opacity="0.50" d="M -900,56 Q -675,45  -450,56 Q -225,67  0,56 Q 225,45  450,56 Q 675,67  900,56"/>
      <path opacity="0.70" d="M -900,64 Q -675,75  -450,64 Q -225,53  0,64 Q 225,75  450,64 Q 675,53  900,64"/>
      <path opacity="0.50" d="M -900,72 Q -675,61  -450,72 Q -225,83  0,72 Q 225,61  450,72 Q 675,83  900,72"/>
      <path opacity="0.30" d="M -900,80 Q -675,91  -450,80 Q -225,69  0,80 Q 225,91  450,80 Q 675,69  900,80"/>
    </g>

    <!-- Band C: y 92–124, flow-left 19s, amp ±8 -->
    <g class="gc" fill="none" stroke="#2A2D3E" stroke-width="1.2">
      <path opacity="0.30" d="M 0,92  Q 225,100 450,92  Q 675,84  900,92  Q 1125,100 1350,92  Q 1575,84  1800,92"/>
      <path opacity="0.50" d="M 0,100 Q 225,92  450,100 Q 675,108 900,100 Q 1125,92  1350,100 Q 1575,108 1800,100"/>
      <path opacity="0.70" d="M 0,108 Q 225,116 450,108 Q 675,100 900,108 Q 1125,116 1350,108 Q 1575,100 1800,108"/>
      <path opacity="0.50" d="M 0,116 Q 225,108 450,116 Q 675,124 900,116 Q 1125,108 1350,116 Q 1575,124 1800,116"/>
