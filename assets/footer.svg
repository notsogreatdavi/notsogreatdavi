      <path opacity="0.30" d="M -900,168 Q -675,158 -450,168 Q -225,178 0,168 Q 225,158 450,168 Q 675,178 900,168"/>
    </g>

    <!-- Band E: y 178–198, flow-left 16s, amp ±7 -->
